name: Deploy WHMCS Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build theme CSS
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.WHMCS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.WHMCS_SSH_PORT }}" "${{ secrets.WHMCS_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy child theme files
        run: |
          ssh -p "${{ secrets.WHMCS_SSH_PORT }}" \
            "${{ secrets.WHMCS_SSH_USER }}@${{ secrets.WHMCS_SSH_HOST }}" \
            "mkdir -p '${{ secrets.WHMCS_ROOT }}/templates/webcare' '${{ secrets.WHMCS_ROOT }}/templates/orderforms/webcare_cart'"

          rsync -az --delete -e "ssh -p ${{ secrets.WHMCS_SSH_PORT }}" \
            whmcs/templates/webcare/ \
            "${{ secrets.WHMCS_SSH_USER }}@${{ secrets.WHMCS_SSH_HOST }}:${{ secrets.WHMCS_ROOT }}/templates/webcare/"

          rsync -az --delete -e "ssh -p ${{ secrets.WHMCS_SSH_PORT }}" \
            whmcs/templates/orderforms/webcare_cart/ \
            "${{ secrets.WHMCS_SSH_USER }}@${{ secrets.WHMCS_SSH_HOST }}:${{ secrets.WHMCS_ROOT }}/templates/orderforms/webcare_cart/"
